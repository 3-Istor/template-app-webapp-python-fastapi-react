services:
  backend:
    build: ./backend
    image: ghcr.io/3-istor/template-app-webapp-python-fastapi-react/backend:latest
    container_name: fastapi-backend
    ports:
      - "8081:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1

  frontend:
    build: ./frontend
    image: ghcr.io/3-istor/template-app-webapp-python-fastapi-react/frontend:latest
    container_name: react-frontend
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    container_name: postgres-db
    profiles:
      - postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-app_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-app_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
